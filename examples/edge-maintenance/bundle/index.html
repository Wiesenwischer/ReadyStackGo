<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wartung — ams.project</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1e293b, #0f172a);
      color: #e2e8f0; padding: 2rem; text-align: center;
    }
    .card { max-width: 34rem; }
    .logo { max-width: 160px; margin-bottom: 1.5rem; }
    h1 { font-size: 1.7rem; margin: .25rem 0 .75rem; }
    p { color: #94a3b8; line-height: 1.55; }
    .badge {
      display: inline-block; margin-bottom: 1rem; padding: .25rem .75rem; border-radius: 999px;
      font-size: .8rem; letter-spacing: .04em; text-transform: uppercase;
      background: #1d4ed833; color: #93c5fd; border: 1px solid #1d4ed855;
    }
    .meta { margin-top: 1.5rem; font-size: .9rem; color: #cbd5e1; min-height: 1.2em; }
    .support { margin-top: 1.5rem; font-size: .85rem; }
    a { color: #93c5fd; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Optional: <img class="logo" src="data:image/svg+xml;base64,..." alt="ams.project" /> -->
    <div class="badge" id="badge">Wartung</div>
    <h1 id="title">Geplante Wartung</h1>
    <p id="body">Dieser Dienst ist vorübergehend wegen Wartungsarbeiten nicht erreichbar. Bitte versuchen Sie es in Kürze erneut.</p>
    <p class="meta" id="meta"></p>
    <p class="support">Support: <a href="mailto:support@kunde.tld">support@kunde.tld</a></p>
  </div>

  <!-- Live-Status: der Edge liefert /__status unter derselben Origin aus. -->
  <script>
    async function refresh() {
      try {
        const r = await fetch('/__status', { cache: 'no-store' });
        if (!r.ok) return;
        const s = await r.json();
        const title = document.getElementById('title');
        const body = document.getElementById('body');
        const badge = document.getElementById('badge');
        const meta = document.getElementById('meta');
        if (s.state === 'deploying') {
          badge.textContent = 'Update'; title.textContent = 'Aktualisierung läuft';
          body.textContent = 'Eine neue Version wird gerade ausgerollt. Der Dienst ist gleich wieder verfügbar.';
        } else {
          badge.textContent = 'Wartung'; title.textContent = 'Geplante Wartung';
          body.textContent = 'Dieser Dienst ist vorübergehend wegen Wartungsarbeiten nicht erreichbar. Bitte versuchen Sie es in Kürze erneut.';
        }
        const bits = [];
        if (s.reason) bits.push(s.reason);
        if (s.until) bits.push('Voraussichtlich bis ' + new Date(s.until).toLocaleString());
        meta.textContent = bits.join(' · ');
        // Wenn der Dienst wieder läuft: Seite neu laden, um durchzuproxen.
        if (s.state === 'running') location.reload();
      } catch (_) { /* Edge evtl. gerade im Reload */ }
    }
    refresh();
    setInterval(refresh, 5000);
  </script>
</body>
</html>
