name: Milestone Release

# Triggered when a milestone is closed.
# Creates a GitHub Release with notes from milestone issues,
# then triggers the Docker Build workflow to push the image.

on:
  milestone:
    types: [closed]

permissions:
  contents: write
  actions: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get milestone version
        id: version
        run: |
          MILESTONE_TITLE="${{ github.event.milestone.title }}"
          # Normalize to 3-part SemVer: v0.51 → v0.51.0
          if [[ "$MILESTONE_TITLE" =~ ^v[0-9]+\.[0-9]+$ ]]; then
            MILESTONE_TITLE="${MILESTONE_TITLE}.0"
          fi
          echo "version=$MILESTONE_TITLE" >> $GITHUB_OUTPUT
          echo "Milestone closed: ${{ github.event.milestone.title }} → Release: $MILESTONE_TITLE"

      - name: Generate release notes
        id: notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          BODY=$(gh api repos/${{ github.repository }}/issues \
            --method GET \
            -f milestone=${{ github.event.milestone.number }} \
            -f state=closed \
            -f per_page=100 \
            --jq '.[] | "- " + .title + " (#" + (.number | tostring) + ")"')

          if [ -z "$BODY" ]; then
            BODY="No issues found in this milestone."
          fi

          # Save to file to avoid shell escaping issues
          echo "## What's Changed in $VERSION" > /tmp/release-notes.md
          echo "" >> /tmp/release-notes.md
          echo "$BODY" >> /tmp/release-notes.md

      - name: Delete draft release if exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # Release Drafter may have created a draft release with this tag.
          # Delete the draft but keep any existing tag (--cleanup-tag is NOT used).
          IS_DRAFT=$(gh release view "$VERSION" --json isDraft --jq .isDraft 2>/dev/null || echo "")
          if [ "$IS_DRAFT" = "true" ]; then
            echo "Deleting draft release $VERSION"
            gh release delete "$VERSION" --yes
          fi

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TITLE="${{ github.event.milestone.description }}"

          # --target main: create tag from current main HEAD
          # gh release create will create the tag if it doesn't exist
          gh release create "$VERSION" \
            --target main \
            --title "$VERSION – $TITLE" \
            --notes-file /tmp/release-notes.md \
            --latest

          echo "✅ Release $VERSION created"

      - name: Trigger Docker Build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          # GITHUB_TOKEN cannot trigger workflows via push events (GitHub security).
          # Use workflow_dispatch to explicitly trigger the Docker Build workflow.
          gh workflow run docker.yml -f tag="$VERSION"

          echo "✅ Docker Build dispatched for $VERSION"

      - name: Summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "### ✅ Release Pipeline Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | $VERSION |" >> $GITHUB_STEP_SUMMARY
          echo "| **Milestone** | ${{ github.event.milestone.title }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Issues** | ${{ github.event.milestone.closed_issues }} closed |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | Created |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Build** | Dispatched |" >> $GITHUB_STEP_SUMMARY
